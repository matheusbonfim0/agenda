{% extends "model-page.html" %}

{% block content %}
      <h2>Agendamentos</h2>
      <a href="evento/">
      <button type="button">Novo Evento</button>
      </a>

      <ul style="font-size: 18px">

          {% for evento in eventos %}
                <li>
                    <div style={% if evento.get_evento_atrasado %}
                                "color:red"
                                {% endif %}>
                        {{ evento.titulo }} - {{ evento.get_data_evento}}
                        ( <a href="evento/?id={{ evento.id }}"> Editar </a>
                        / <form method="post" action="evento/delete/{{ evento.id }}" style="display:inline">
                            {% csrf_token %}
                            <button type="submit">Excluir</button>
                          </form>)
                    </div>
                </li>
          {% endfor %}

      </ul>
{% endblock %}
